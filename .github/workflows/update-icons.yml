name: Update Map Icons

on:
  schedule:
    - cron: '0 */12 * * *'  # Runs every 12 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Set DEFAULT_BRANCH env variable
        run: echo "DEFAULT_BRANCH=${{ github.event.repository.default_branch }}" >> $GITHUB_ENV

      - name: Get latest CS2 manifest ID
        id: cs2_manifest
        run: |
          node -e "
          const SteamUser = require('steam-user');
          const user = new SteamUser();
          user.logOn({ anonymous: true });
          user.once('loggedOn', async () => {
            const info = await user.getProductInfo([730], [], true);
            const gid = info.apps[730].appinfo.depots[2347770].manifests.public.gid;
            console.log('manifest=' + gid);
            process.exit(0);
          });
          " >> $GITHUB_OUTPUT

      - name: Cache temp VPK files
        uses: actions/cache@v4
        with:
          path: ./temp
          key: ${{ runner.os }}-vpk-${{ steps.cs2_manifest.outputs.manifest }}
          restore-keys: |
            ${{ runner.os }}-vpk-

      - name: Get latest Source2Viewer-CLI version
        id: s2v_version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ValveResourceFormat/ValveResourceFormat/releases/latest | jq -r '.tag_name')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache Source2Viewer-CLI
        uses: actions/cache@v4
        with:
          path: ./s2v
          key: ${{ runner.os }}-s2v-${{ steps.s2v_version.outputs.version }}
      
      - name: Check if manifest changed
        id: manifest_check
        run: |
          NEW="${{ steps.cs2_manifest.outputs.manifest }}"
          OLD=$(cat static/manifest.txt 2>/dev/null || echo "")

          echo "old=$OLD"
          echo "new=$NEW"

          if [ "$NEW" = "$OLD" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper script
        run: node download-map-icons.js

      - name: Generate HTML
        if: steps.manifest_check.outputs.changed == 'true'
        run: node gen_html.js

      - name: Read manifestId.txt
        id: manifestId
        uses: juliangruber/read-file-action@v1
        with:
          path: ./static/manifest.txt

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push if changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: manifest ${{ steps.manifestId.outputs.content }}"